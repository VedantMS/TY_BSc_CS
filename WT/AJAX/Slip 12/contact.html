<html>
    <head>
        <title> Slip 12: Contact List </title>
    </head>

    <body>
        <h1> Contact List </h1>
        
        <input type = "button" value = "Get Contact List" onClick = "getContactList()">
        <p id = "contactList"> </p>

        <script>
            function getContactList() {
                var xhr = new XMLHttpRequest();
                xhr.onreadystatechange = function() {
                    if(this.readyState == 4 && this.status == 200) {
                        document.getElementById("contactList").innerHTML = this.responseText;
                    }
                }

                xhr.open("GET", "contact.php", true);
                xhr.send();
            }
        </script>

    </body>
</html>
