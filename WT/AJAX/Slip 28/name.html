<html>
    <head>
        <title> Slip 28: Username and Password Validation </title>
    </head>

    <body>
        <h1> Username and Password Validation </h1>
        Enter Username: <input type = "text" id = "username">
        <br><br>
        Enter Password: <input type = "password" id = "password">
        <br><br>
        <input type = "submit" value = "Submit" onclick = "display()">

        <p id = "info"> </p>

        <script>
            function display() {
                var xhr = new XMLHttpRequest();
                xhr.onreadystatechange = function() {
                    if(this.readyState == 4 && this.status == 200) {
                        document.getElementById("info").innerHTML = this.responseText;
                    }
                }

                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;
                xhr.open("GET", "name.php?username=" + username + "&password=" + password, true);
                xhr.send();
            }
        </script>

    </body>
</html>
