<html>
	<head>
		<title> </title>
	</head>

	<body>
		<script src = "https://code.jquery.com/jquery-3.6.0.min.js"> </script>

		<h1> jQuery Text </h1>

		<button id = "beforeBtn"> Add Before Text </button>
		<button id = "afterBtn"> Add After Text </button>

		<p id = "para"> <i> To see a World in a Grain of Sand <br>
							and Heaven in Wild Flower <br>
							hold Infinity in the palm of your hand <br>
							and an eternity in an hour
						</i>
		</p>

		<script>
			$(document).ready(function() {
				$("#beforeBtn").click(function() {
					$("#para").before("<h2> Auguries of Innocence </h2>");
				});

				$("#afterBtn").click(function() {
					$("#para").after("<h3> William Blake </h3>");
				});
			});
		</script>
	</body>
</html>
