<html>
	<head>
		<title> Slip 8: Message Display and Addition </title>
	</head>

	<body>
		<script>
			alert("Exams are near, have you started preparing for?");

			var ans = confirm("Would you like to see addition on two numbers?")

			if(ans) {
				var num1 = Number(prompt("Enter First Number: "));
				var num2 = Number(prompt("Enter Second Number: "));

				document.write("<h1> Addition of two numbers: </h1>");
				document.write(num1 + " + " + num2 + " = " + (num1 + num2));
			}

			else {
				document.write("<h1> Addition Canceled </h1>");
			}
		</script>
	</body>
</html>
